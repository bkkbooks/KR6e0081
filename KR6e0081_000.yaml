front:
  text: 五教止觀一乘十玄門合行敘夫五教止觀也者華嚴初祖帝心尊者所造且一乘十玄門也者第二祖至相大師所撰也偕釋于大不思議經而始起五教乃立十玄是顯於無閡重重因陀羅珠網之寶冊示乎圓融隱隱錠光頗黎鏡之玉章也或日書林井氏袖彼二小策子來謂云頃日雕刻入梓因思欲及于遐邇而卷軸至少若別行者恐煩披閲是故合集以行焉因乞措一辭於卷首繇旃應索書而為敘惟時元祿第九丙子八月穀旦寓智積覺眼空敬識
